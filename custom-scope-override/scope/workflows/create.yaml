steps:
  - name: clone_role
    type: script
    file: "$OVERRIDES_PATH/scope/iam/import_aws_role"
    before: iam
  - name: networking
    type: workflow
    steps:
      - name: generate_disaster_recovery_domain
        type: script
        file: "$OVERRIDES_PATH/scope/disaster_recovery/generate_disaster_recovery_domain"
        after: generate domain
        output:
          - name: SCOPE_DOMAIN
            type: environment
          - name: RECOVERY_DOMAIN
            type: environment
      - name: manage_recovery_dns
        type: script
        file: "$OVERRIDES_PATH/scope/disaster_recovery/manage_recovery_dns"
        after: generate_disaster_recovery_domain
        configuration:
          ACTION: CREATE
        pre:
          name: build_recovery_dns_context
          type: script
          file: "$SERVICE_PATH/scope/networking/dns/build_dns_context"
          output:
            - name: HOSTED_PUBLIC_ZONE_ID
              type: environment
            - name: HOSTED_PRIVATE_ZONE_ID
              type: environment
