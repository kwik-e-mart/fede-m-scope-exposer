steps:
- name: networking
  type: workflow
  steps:
    - name: delete_recovery_dns
      type: script
      file: "$OVERRIDES_PATH/scope/disaster_recovery/manage_recovery_dns"
      after: delete dns
      configuration:
        ACTION: DELETE
      pre:
        name: build_recovery_dns_context
        type: script
        file: "$SERVICE_PATH/scope/networking/dns/build_dns_context"
        output:
          - name: HOSTED_PUBLIC_ZONE_ID
            type: environment
          - name: HOSTED_PRIVATE_ZONE_ID
            type: environment